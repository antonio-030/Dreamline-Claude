services:
  dreamline:
    build: .
    ports:
      - "8100:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Claude Auth-Dateien: Read-Only (Credentials + globale Config schützen)
      - ${HOME}/.claude/.credentials.json:/home/dreamline/.claude/.credentials.json:ro
      - ${HOME}/.claude.json:/home/dreamline/.claude.json:ro
      # Claude Projekte: Read-Write (Memory-Dateien + Hooks schreiben)
      - ${HOME}/.claude/projects:/home/dreamline/.claude/projects
      # Codex Sessions: Read-Only (nur lesen, Watcher schreibt nicht in Codex)
      - ${HOME}/.codex:/home/dreamline/.codex:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - backend
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dreamline
      POSTGRES_USER: dreamline
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dreamline_secret}
    volumes:
      - dreamline_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dreamline"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    # Isoliertes Netzwerk – nur dreamline und db, DB nicht von aussen erreichbar

volumes:
  dreamline_data:
